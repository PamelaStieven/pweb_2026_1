<!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrículas</title>

</head>

<body>

    <form action="sucesso.html">
        <fieldset>
        <legend><strong>Formulário de Matrícula</strong></legend>

            <fieldset>
            <legend><strong>Matrícula de Alunos</strong></legend>

            <br>

            <label for="pnome">Nome do aluno:</label><br>
            <input type="text" id="pnome" name="pnome" maxlength="50" placeholder="José da Silva" required>

            <br><br>

            <label for="calendario"><strong>Data de Nascimento:</strong></label><br>
            <input type="date" id="calendario" name="calendario" required>

            <br><br>

            <label for="email"><strong>E-mail:</strong></label><br>
            <input type="email" id="email" name="email" placeholder="aluno@gmail.com" required>

            <br><br>

            <label for="telefone"><strong>Telefone:</strong></label><br>
            <input type="tel" id="telefone" name="telefone" maxlength="12" placeholder="4999999-9999" required>

            <br><br>

            <label for="serie"><strong>Série:</strong></label><br>
            <select name="serie" id="serie" required>
            <option value="">Selecione</option>
            <option value="primeiro">1° Ano</option>
            <option value="segundo">2° Ano</option>
            <option value="terceiro">3° Ano</option>
            <option value="quarto">4° Ano</option>
            </select>

            <br><br>

            <p><strong>Turno Preferencial:</strong></p>
            <input type="radio" id="manha" name="turno" value="manha" required>
            <label for="manha">Manhã</label>
            <input type="radio" id="tarde" name="turno" value="tarde">
            <label for="tarde">Tarde</label>
            <input type="radio" id="noite" name="turno" value="noite">
            <label for="noite">Noite</label>

            <br><br>

            <p><strong>Atividades Extra-Curriculares:</strong></p>
            <input type="checkbox" id="tea" name="atividade" value="teatro">
            <label for="tea">Teatro</label>
            <input type="checkbox" id="music" name="atividade" value="musica">
            <label for="music">Música</label>
            <input type="checkbox" id="bal" name="atividade" value="ballet">
            <label for="bal">Ballet</label><br>
            <input type="checkbox" id="pint" name="atividade" value="pintura">
            <label for="pint">Pintura</label>
            <input type="checkbox" id="judo" name="atividade" value="judo">
            <label for="judo">Judô</label>
            <input type="checkbox" id="fut" name="atividade" value="futebol">
            <label for="fut">Futebol</label>

            <br><br>

            <button type="submit">Submit</button>

            </fieldset>
        </fieldset>

    </form>

</body>
</html>
