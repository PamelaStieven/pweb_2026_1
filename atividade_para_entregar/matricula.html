<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/action_page.html">
        <fieldset>
            <legend><strong> Matrícula de Alunos</strong></legend>
                <br>
            <label for="pnome">Nome do aluno:</label><br>
            <input type="text" id="pnome" name="pnome" maxlength="50">
                <br>
                <br>
            <p><strong>Data de Nascimento:</strong></p>
            <input type="date" id="calendario" name="calendario">
                <br>
                <br>
            <p><strong>E-mail:</strong></p>
            <input type="email" id="email" name="email">
                <br>
                <br>
            <p><strong>Telefone:</strong></p>
                <br>
                <br>
            <p><strong>Série:</strong></p>
            <select name="turno" id="turno">
                <option value="primeiro">1° Ano</option>
                <option value="segundo">2° Ano</option>
                <option value="terceiro">3° Ano</option>
                <option value="quarto">4° Ano</option>
            </select>
                <br>
                <br>
            <p><strong>Turno Preferencial:</strong></p>
            <input type="radio" id="Manhã" name="turno" value="Manhã">
            <label for="Manhã">Manhã</label>
            <input type="radio" id="Tarde" name="turno" value="Tarde">
            <label for="Tarde">Tarde</label>
            <input type="radio" id="Noite" name="turno" value="Noite">
            <label for="Noite">Noite</label>
                <br>
                <br>
            <p><strong>Atividades Extra - Curriculares:</strong></p>
            <input type="checkbox" id="tea" name="tea" value="teatro">
            <label for="tea">Teatro</label>
            <input type="checkbox" id="music" name="music" value="musica">
            <label for="music">Música</label>
            <input type="checkbox" id="bal" name="bal" value="ballet">
            <label for="bal">Ballet</label><br>
            <input type="checkbox" id="pint" name="pint" value="pintura">
            <label for="pint">Pintura</label>
            <input type="checkbox" id="judo" name="judo" value="judo">
            <label for="judo">Judô</label>
            <input type="checkbox" id="fut" name="fut" value="futsal">
            <label for="fut">Futsal</label>
</body>
</html>
